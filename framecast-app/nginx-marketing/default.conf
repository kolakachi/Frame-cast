server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript text/html;
    gzip_min_length 1024;

    # Clean URLs: /terms → terms.html, /privacy → privacy.html
    location = /terms          { try_files /terms.html =404; }
    location = /privacy        { try_files /privacy.html =404; }
    location = /refund         { try_files /refund.html =404; }
    location = /data-deletion  { try_files /data-deletion.html =404; }
    location = /help           { try_files /help.html =404; }
    location = /logo           { try_files /logo-export.html =404; }
    location = /robots.txt     { try_files /robots.txt =404; }
    location = /sitemap.xml    { try_files /sitemap.xml =404; }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
