; WyvStudio php-fpm pool tuning — overrides the stock www.conf (max_children=5).
;
; The api previously ran `php artisan serve` (single request at a time): one
; slow request (one-shot plan = URL fetch + LLM, 10-30s) froze the whole API.
; php-fpm gives real concurrency. Most requests here are I/O-bound (waiting on
; OpenAI/Postgres/B2), so we run far more workers than the 2 CPU cores — they
; mostly sleep on I/O. 16 workers x ~90MB ≈ 1.5GB, well within the box's RAM.
[www]
pm = dynamic
pm.max_children = 16
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

; Recycle nothing silently — surface slow requests in the log.
request_slowlog_timeout = 15s
slowlog = /proc/self/fd/2

; Expose status for monitoring (internal only; nginx does not proxy it).
pm.status_path = /fpm-status

catch_workers_output = yes
decorate_workers_output = no
