server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docusaurus emits a directory per route (/path/index.html) — resolve those,
    # fall back to the generated 404 page.
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    # Long-cache the fingerprinted assets.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
