services:

  # ── Marketing site: serves wyvstudio.com (landing, terms, privacy) ─────────
  marketing:
    image: nginx:1.27-alpine
    volumes:
      - ./marketing:/usr/share/nginx/html:ro
      - ./nginx-marketing/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # ── Nginx: serves Vue SPA + reverse proxies API + Reverb ──────────────────
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_API_URL: ${APP_URL}
        VITE_REVERB_APP_KEY: ${REVERB_APP_KEY}
        VITE_REVERB_HOST: ${REVERB_HOST}
        VITE_REVERB_PORT: ${REVERB_PORT:-443}
        VITE_REVERB_SCHEME: ${REVERB_SCHEME:-https}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-production}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.1}
        VITE_CRISP_WEBSITE_ID: ${VITE_CRISP_WEBSITE_ID:-}
        VITE_POSTHOG_KEY: ${VITE_POSTHOG_KEY:-}
        VITE_POSTHOG_HOST: ${VITE_POSTHOG_HOST:-https://us.i.posthog.com}
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - api
      - reverb

  # ── Laravel API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
    command: php artisan serve --host=0.0.0.0 --port=8000
    env_file:
      - ./api/.env
    environment:
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REDIS_QUEUE_RETRY_AFTER: 2400
    working_dir: /var/www/html
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Queue workers ──────────────────────────────────────────────────────────
  worker-generation:
    build:
      context: ./api
    command: php artisan queue:work redis --queue=generation,tts,visual,translation --tries=2 --sleep=3
    # On deploy (SIGTERM) let a busy worker finish its current job before
    # SIGKILL. Must exceed the LONGEST job timeout on these queues —
    # GenerateAIImageJob is 300s (gpt-image-2 character path runs 3-4 min),
    # and the old 90s grace SIGKILLed it mid-run on every deploy: the job
    # re-queued (delay) and its up-front credit reservation leaked (no catch
    # runs on SIGKILL), double-charging on retry. 330s lets it finish.
    stop_grace_period: 330s
    env_file:
      - ./api/.env
    environment:
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REDIS_QUEUE_RETRY_AFTER: 2400
    working_dir: /var/www/html
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-exports:
    build:
      context: ./api
    command: php artisan queue:work redis --queue=exports,rendering --tries=2 --timeout=2700 --sleep=3
    # Renders are long; give a near-done export room to finish on deploy.
    stop_grace_period: 120s
    env_file:
      - ./api/.env
    environment:
      REVERB_HOST: reverb
      REDIS_QUEUE_RETRY_AFTER: 3000
    working_dir: /var/www/html
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-default:
    build:
      context: ./api
    command: php artisan queue:work redis --queue=default --tries=2 --sleep=3
    stop_grace_period: 30s
    env_file:
      - ./api/.env
    environment:
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REDIS_QUEUE_RETRY_AFTER: 2400
    working_dir: /var/www/html
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: ./api
    command: php artisan schedule:work
    env_file:
      - ./api/.env
    environment:
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    working_dir: /var/www/html
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Reverb WebSocket ───────────────────────────────────────────────────────
  reverb:
    build:
      context: ./api
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    env_file:
      - ./api/.env
    environment:
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    working_dir: /var/www/html
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_DATABASE:-framecast}
      POSTGRES_USER: ${DB_USERNAME:-framecast}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-framecast} -d ${DB_DATABASE:-framecast}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ── Redis (AOF persistence) ────────────────────────────────────────────────
  # Internal headless-browser renderer — fetches JS-rendered (SPA) pages as
  # text for one-shot URL grounding (OneShotPromptParser::fetchRendered).
  # Deliberately NO public port: it fetches arbitrary URLs on request and
  # must only be reachable from inside the compose network.
  renderer:
    build:
      context: ./renderer
    restart: unless-stopped
    shm_size: '512m'

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
