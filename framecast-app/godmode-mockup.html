<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Framecast — God Mode</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2129;
    --border: #2a2d38;
    --text: #e4e6ef;
    --muted: #6b7280;
    --accent: #7c3aed;
    --accent-soft: #7c3aed22;
    --green: #10b981;
    --green-soft: #10b98120;
    --red: #ef4444;
    --red-soft: #ef444420;
    --yellow: #f59e0b;
    --yellow-soft: #f59e0b20;
    --blue: #3b82f6;
    --blue-soft: #3b82f620;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-logo { padding: 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .sidebar-logo span { font-weight: 700; font-size: 15px; }
  .god-badge { background: var(--accent); color: #fff; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; letter-spacing: .5px; }
  .sidebar-nav { padding: 12px 8px; flex: 1; }
  .nav-section { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: .8px; text-transform: uppercase; padding: 12px 8px 6px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 7px; cursor: pointer; color: var(--muted); transition: all .15s; font-weight: 500; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .nav-badge { margin-left: auto; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  .topbar-title { font-weight: 700; font-size: 16px; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .content { flex: 1; overflow-y: auto; padding: 24px; }

  /* Cards */
  .metrics-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-bottom: 24px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .metric-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .metric-value { font-size: 24px; font-weight: 700; line-height: 1; }
  .metric-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .metric-card.green .metric-value { color: var(--green); }
  .metric-card.red .metric-value { color: var(--red); }
  .metric-card.yellow .metric-value { color: var(--yellow); }
  .metric-card.blue .metric-value { color: var(--blue); }
  .metric-card.purple .metric-value { color: var(--accent); }

  /* Section */
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 20px; }
  .section-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .section-title { font-weight: 700; font-size: 14px; }
  .section-body { padding: 0; }

  /* Filters */
  .filters { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .search-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 7px; font-size: 13px; width: 220px; outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .filter-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 7px; font-size: 13px; outline: none; cursor: pointer; }
  .filter-label { font-size: 12px; color: var(--muted); }
  .filter-count { margin-left: auto; font-size: 12px; color: var(--muted); }

  /* Table */
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 11px 16px; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .user-cell { display: flex; align-items: center; gap: 10px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; }
  .user-name { font-weight: 600; }
  .user-email { font-size: 11px; color: var(--muted); }

  /* Badges */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-green { background: var(--green-soft); color: var(--green); }
  .badge-red { background: var(--red-soft); color: var(--red); }
  .badge-yellow { background: var(--yellow-soft); color: var(--yellow); }
  .badge-blue { background: var(--blue-soft); color: var(--blue); }
  .badge-purple { background: var(--accent-soft); color: var(--accent); }
  .badge-gray { background: #ffffff12; color: var(--muted); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #6d28d9; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text); background: var(--surface2); }
  .btn-danger { background: var(--red-soft); color: var(--red); border: 1px solid #ef444430; }
  .btn-danger:hover { background: var(--red); color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .btn-impersonate { background: var(--yellow-soft); color: var(--yellow); border: 1px solid #f59e0b30; }
  .btn-impersonate:hover { background: var(--yellow); color: #000; }

  /* Dot */
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .dot-green { background: var(--green); }
  .dot-red { background: var(--red); }
  .dot-yellow { background: var(--yellow); }
  .dot-gray { background: var(--muted); }

  /* Spend trend */
  .spend-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .spend-fill { height: 100%; border-radius: 2px; background: var(--accent); }

  /* User Detail Panel */
  .panel-overlay { position: fixed; inset: 0; background: #00000060; z-index: 100; display: none; }
  .panel-overlay.open { display: block; }
  .user-panel { position: fixed; top: 0; right: 0; width: 760px; height: 100vh; background: var(--surface); border-left: 1px solid var(--border); z-index: 101; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .25s ease; overflow: hidden; }
  .user-panel.open { transform: translateX(0); }
  .panel-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 14px; flex-shrink: 0; }
  .panel-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; flex-shrink: 0; }
  .panel-user-info { flex: 1; }
  .panel-user-name { font-size: 18px; font-weight: 700; }
  .panel-user-email { color: var(--muted); margin-top: 2px; }
  .panel-badges { display: flex; gap: 6px; margin-top: 8px; }
  .panel-actions { display: flex; gap: 8px; align-items: flex-start; }
  .panel-close { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; border-radius: 5px; font-size: 20px; line-height: 1; }
  .panel-close:hover { color: var(--text); background: var(--surface2); }

  /* Panel tabs */
  .panel-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 24px; flex-shrink: 0; background: var(--surface); }
  .panel-tab { padding: 12px 16px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; white-space: nowrap; }
  .panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .panel-tab:hover:not(.active) { color: var(--text); }
  .panel-body { flex: 1; overflow-y: auto; padding: 24px; }

  /* Spend toggle */
  .spend-toggle { display: flex; background: var(--surface2); border-radius: 7px; padding: 3px; gap: 2px; }
  .spend-toggle-btn { padding: 5px 14px; border-radius: 5px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; background: none; color: var(--muted); transition: all .15s; }
  .spend-toggle-btn.active { background: var(--accent); color: #fff; }

  /* Spend chart placeholder */
  .chart-placeholder { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; height: 140px; display: flex; align-items: flex-end; gap: 4px; padding: 16px 16px 0; overflow: hidden; }
  .chart-bar { flex: 1; border-radius: 4px 4px 0 0; background: var(--accent); opacity: .7; min-width: 0; transition: opacity .15s; }
  .chart-bar:hover { opacity: 1; }

  /* Mini stats grid */
  .mini-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .mini-stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .mini-stat-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
  .mini-stat-value { font-size: 20px; font-weight: 700; margin-top: 4px; }

  /* Job status */
  .job-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .job-row:last-child { border-bottom: none; }
  .job-name { font-weight: 600; flex: 1; }
  .job-meta { font-size: 12px; color: var(--muted); }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; width: 80px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; }

  /* Provider usage */
  .provider-row { display: flex; align-items: center; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .provider-row:last-child { border-bottom: none; }
  .provider-name { font-weight: 600; width: 100px; flex-shrink: 0; }
  .provider-bar-wrap { flex: 1; }
  .provider-calls { font-size: 12px; color: var(--muted); width: 60px; text-align: right; }
  .provider-cost { font-size: 13px; font-weight: 600; width: 70px; text-align: right; color: var(--accent); }

  /* Workspace card */
  .ws-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .ws-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .ws-name { font-weight: 700; font-size: 14px; }
  .ws-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .ws-stat { text-align: center; }
  .ws-stat-val { font-size: 18px; font-weight: 700; }
  .ws-stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; }

  /* Video table compact */
  .video-table td { padding: 9px 12px; }
  .video-table th { padding: 9px 12px; }

  /* Impersonate banner */
  .impersonate-info { background: var(--yellow-soft); border: 1px solid #f59e0b40; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; color: var(--yellow); font-size: 13px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .section-actions { margin-left: auto; display: flex; gap: 8px; }
  .empty-state { text-align: center; padding: 40px; color: var(--muted); }
</style>
</head>
<body>

const planColors = { free:'badge-gray', studio:'badge-purple', scale:'badge-blue', enterprise:'badge-yellow' };

function showView(view) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  const titles = { dashboard:'Platform Overview', users:'Users', workspaces:'Workspaces', videos:'Videos', jobs:'Queue & Jobs', billing:'Billing' };
  document.getElementById('topbar-title').textContent = titles[view] || view;
  const c = document.getElementById('main-content');
  if (view === 'dashboard') renderDashboard(c);
  else if (view === 'users') renderUsers(c);
  else if (view === 'workspaces') renderWorkspaces(c);
  else if (view === 'videos') renderVideos(c);
  else if (view === 'jobs') renderJobs(c);
  else if (view === 'billing') renderBilling(c);
}

          </div>
        </div>

function filterUsers(val) {
  const rows = document.querySelectorAll('#users-table tbody tr');
  rows.forEach(r => {
    const q = (val||'').toLowerCase();
    const matchText = !q || r.dataset.name.includes(q) || r.dataset.email.includes(q);
    r.style.display = matchText ? '' : 'none';
  });
}

// User detail panel
function openPanel(id) {
  const u = users.find(x=>x.id===id);
  if(!u) return;
  document.getElementById('panel-avatar').style.cssText = `background:${u.color}20;color:${u.color}`;
  document.getElementById('panel-avatar').textContent = u.avatar;
  document.getElementById('panel-name').textContent = u.name;
  document.getElementById('panel-email').textContent = u.email;
  document.getElementById('panel-badges').innerHTML = `
    <span class="badge ${planColors[u.plan]}">${u.plan}</span>
    <span class="badge ${u.status==='active'?'badge-green':'badge-red'}">${u.status}</span>
    <span class="badge badge-gray">${u.workspace}</span>
  `;
  document.querySelectorAll('.panel-tab').forEach((t,i)=>t.classList.toggle('active',i===0));
  renderPanelOverview(u);
  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('user-panel').classList.add('open');
  document.body._panelUser = u;
}

function closePanel() {
  document.getElementById('panel-overlay').classList.remove('open');
  document.getElementById('user-panel').classList.remove('open');
}

function switchTab(el, tab) {
  document.querySelectorAll('.panel-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const u = document.body._panelUser;
  if(tab==='overview') renderPanelOverview(u);
  else if(tab==='workspaces') renderPanelWorkspaces(u);
  else if(tab==='videos') renderPanelVideos(u);
  else if(tab==='jobs') renderPanelJobs(u);
  else if(tab==='providers') renderPanelProviders(u);
}
