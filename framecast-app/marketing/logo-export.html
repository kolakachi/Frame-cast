<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WyvStudio Logo Export — 1024×1024</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 24px; font-family: sans-serif; }
  p { font-size: 13px; color: #888; }
</style>
</head>
<body>

<!-- 1024×1024 — right-click → Save image as logo.png OR screenshot this element -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" rx="224" fill="#ff6b35"/>
  <!-- W path: two interlocking thread strands -->
  <path
    d="M224 288 L352 736 L512 448 L672 736 L800 288"
    stroke="white"
    stroke-width="72"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Subtle weave arc connecting the two peaks -->
  <path
    d="M432 592 Q512 448 592 592"
    stroke="rgba(255,255,255,0.32)"
    stroke-width="40"
    stroke-linecap="round"
    fill="none"
  />
</svg>

<p>1024 × 1024px — Right-click → Save image, or screenshot. Use for TikTok, YouTube, and app stores.</p>

<!-- Also show on dark bg for reference -->
<svg width="256" height="256" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" style="border-radius:56px;box-shadow:0 8px 32px rgba(0,0,0,.15)">
  <rect width="1024" height="1024" rx="224" fill="#ff6b35"/>
  <path d="M224 288 L352 736 L512 448 L672 736 L800 288" stroke="white" stroke-width="72" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M432 592 Q512 448 592 592" stroke="rgba(255,255,255,0.32)" stroke-width="40" stroke-linecap="round" fill="none"/>
</svg>
<p>256px preview</p>

</body>
</html>
