<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WyvStudio Logo Export</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f5; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 24px; font-family: -apple-system, sans-serif; padding: 40px; }
  h1 { font-size: 18px; font-weight: 600; color: #111; }
  p  { font-size: 13px; color: #888; text-align: center; max-width: 400px; line-height: 1.5; }
  canvas { display: none; }
  .btn {
    padding: 12px 28px; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; background: #ff6b35; color: #fff;
    transition: .15s; text-decoration: none; display: inline-block;
  }
  .btn:hover { background: #e85e2a; }
  .btn-ghost {
    background: #fff; color: #333; border: 1px solid #ddd; font-weight: 500;
  }
  .btn-ghost:hover { background: #f0f0f0; }
  .preview { border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,.15); }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .sizes { display: flex; gap: 16px; align-items: flex-end; margin-top: 8px; }
  .size-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .size-label { font-size: 11px; color: #999; }
</style>
</head>
<body>

<h1>WyvStudio Logo</h1>

<!-- Hidden canvas used for PNG conversion -->
<canvas id="c" width="1024" height="1024"></canvas>

<!-- Preview at 256px -->
<svg class="preview" id="logoSvg" width="256" height="256" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" rx="224" fill="#ff6b35"/>
  <path d="M224 288 L352 736 L512 448 L672 736 L800 288"
    stroke="white" stroke-width="72" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M432 592 Q512 448 592 592"
    stroke="rgba(255,255,255,0.32)" stroke-width="40" stroke-linecap="round" fill="none"/>
</svg>

<div class="sizes">
  <div class="size-item">
    <svg width="64" height="64" viewBox="0 0 1024 1024" fill="none"><rect width="1024" height="1024" rx="224" fill="#ff6b35"/><path d="M224 288 L352 736 L512 448 L672 736 L800 288" stroke="white" stroke-width="72" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    <span class="size-label">64px</span>
  </div>
  <div class="size-item">
    <svg width="32" height="32" viewBox="0 0 1024 1024" fill="none"><rect width="1024" height="1024" rx="224" fill="#ff6b35"/><path d="M224 288 L352 736 L512 448 L672 736 L800 288" stroke="white" stroke-width="72" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    <span class="size-label">32px</span>
  </div>
</div>

<div class="actions">
  <button class="btn" onclick="downloadPng(1024, 'wyvstudio-logo-1024.png')">⬇ Download PNG 1024×1024</button>
  <button class="btn btn-ghost" onclick="downloadPng(512, 'wyvstudio-logo-512.png')">512×512</button>
  <button class="btn btn-ghost" onclick="downloadPng(256, 'wyvstudio-logo-256.png')">256×256</button>
  <button class="btn btn-ghost" onclick="downloadSvg()">Download SVG</button>
</div>

<p>Use the 1024×1024 PNG for TikTok, YouTube, and app stores.<br>Use the SVG for web and high-resolution print.</p>

<script>
const svgString = `<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" rx="224" fill="#ff6b35"/>
  <path d="M224 288 L352 736 L512 448 L672 736 L800 288" stroke="white" stroke-width="72" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M432 592 Q512 448 592 592" stroke="rgba(255,255,255,0.32)" stroke-width="40" stroke-linecap="round" fill="none"/>
</svg>`;

function downloadPng(size, filename) {
  const canvas = document.getElementById('c');
  canvas.width  = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const img  = new Image();

  img.onload = function() {
    ctx.clearRect(0, 0, size, size);
    ctx.drawImage(img, 0, 0, size, size);
    URL.revokeObjectURL(url);

    canvas.toBlob(function(pngBlob) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(pngBlob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }, 'image/png');
  };

  img.src = url;
}

function downloadSvg() {
  const blob = new Blob([svgString], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'wyvstudio-logo.svg';
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
</body>
</html>
