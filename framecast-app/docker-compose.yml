services:
  api:
    build:
      context: ./api
    command: php artisan serve --host=0.0.0.0 --port=8000
    env_file:
      - ./api/.env
    environment:
      REVERB_HOST: reverb
      REDIS_QUEUE_RETRY_AFTER: 2400
    working_dir: /var/www/html
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-default:
    build:
      context: ./api
    command: php artisan queue:work redis --queue=default --tries=1
    env_file:
      - ./api/.env
    environment:
      REVERB_HOST: reverb
      REDIS_QUEUE_RETRY_AFTER: 2400
    working_dir: /var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-generation:
    build:
      context: ./api
    command: php artisan queue:work redis --queue=generation,tts,visual,translation --tries=1
    env_file:
      - ./api/.env
    environment:
      REVERB_HOST: reverb
      REDIS_QUEUE_RETRY_AFTER: 2400
    working_dir: /var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-exports:
    build:
      context: ./api
    command: php artisan queue:work redis --queue=exports,rendering --tries=1 --timeout=2700
    env_file:
      - ./api/.env
    environment:
      REVERB_HOST: reverb
      REDIS_QUEUE_RETRY_AFTER: 3000
    working_dir: /var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: ./api
    command: php artisan schedule:work
    env_file:
      - ./api/.env
    environment:
      REVERB_HOST: reverb
      REDIS_QUEUE_RETRY_AFTER: 2400
    working_dir: /var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  reverb:
    build:
      context: ./api
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    env_file:
      - ./api/.env
    environment:
      REVERB_HOST: reverb
      REDIS_QUEUE_RETRY_AFTER: 2400
    working_dir: /var/www/html
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy

  horizon:
    build:
      context: ./api
    command: php artisan horizon
    env_file:
      - ./api/.env
    environment:
      REVERB_HOST: reverb
      REDIS_QUEUE_RETRY_AFTER: 2400
    working_dir: /var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -lc "mkdir -p node_modules && find node_modules -mindepth 1 -maxdepth 1 -exec rm -rf {} + && yarn install --ignore-platform && yarn dev --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_REVERB_APP_KEY: framecast-app-key
      VITE_REVERB_HOST: localhost
      VITE_REVERB_PORT: 8080
      VITE_REVERB_SCHEME: http
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api
      - reverb

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/framecast;
      mc anonymous set public local/framecast;
      exit 0;
      "

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: framecast
      POSTGRES_USER: framecast
      POSTGRES_PASSWORD: framecast
    command: postgres -c fsync=off -c synchronous_commit=off -c full_page_writes=off
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U framecast -d framecast"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 3s

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
  minio_data:
