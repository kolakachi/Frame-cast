services:
  api:
    build:
      context: ./api
    command: php artisan serve --host=0.0.0.0 --port=8000
    env_file:
      - ./api/.env
    environment:
      REVERB_HOST: reverb
    working_dir: /var/www/html
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./api
    command: php artisan queue:work redis --queue=exports,default,generation,tts,visual,translation,rendering --tries=1
    env_file:
      - ./api/.env
    environment:
      REVERB_HOST: reverb
    working_dir: /var/www/html
    depends_on:
      - postgres
      - redis

  scheduler:
    build:
      context: ./api
    command: php artisan schedule:work
    env_file:
      - ./api/.env
    environment:
      REVERB_HOST: reverb
    working_dir: /var/www/html
    depends_on:
      - postgres
      - redis

  reverb:
    build:
      context: ./api
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    env_file:
      - ./api/.env
    environment:
      REVERB_HOST: reverb
    working_dir: /var/www/html
    ports:
      - "8080:8080"
    depends_on:
      - redis

  horizon:
    build:
      context: ./api
    command: php artisan horizon
    env_file:
      - ./api/.env
    environment:
      REVERB_HOST: reverb
    working_dir: /var/www/html
    depends_on:
      - postgres
      - redis

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -lc "mkdir -p node_modules && find node_modules -mindepth 1 -maxdepth 1 -exec rm -rf {} + && yarn install --ignore-platform && yarn dev --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_REVERB_APP_KEY: framecast-app-key
      VITE_REVERB_HOST: localhost
      VITE_REVERB_PORT: 8080
      VITE_REVERB_SCHEME: http
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api
      - reverb

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: framecast
      POSTGRES_USER: framecast
      POSTGRES_PASSWORD: framecast
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
