# Shared FastCGI params for routing a request to the api php-fpm container.
# Laravel routes off REQUEST_URI, so we point SCRIPT_FILENAME at the front
# controller (public/index.php, which exists on the php-fpm container's
# filesystem — nginx never reads it) and pass the original URI through.
fastcgi_pass   api:9000;
fastcgi_index  index.php;
include        fastcgi_params;
fastcgi_param  SCRIPT_FILENAME  /var/www/html/public/index.php;
fastcgi_param  SCRIPT_NAME      /index.php;
fastcgi_param  DOCUMENT_ROOT    /var/www/html/public;
fastcgi_param  REQUEST_URI      $request_uri;
fastcgi_param  HTTPS            on;
fastcgi_param  HTTP_X_FORWARDED_PROTO https;
fastcgi_param  HTTP_X_FORWARDED_FOR   $proxy_add_x_forwarded_for;
fastcgi_param  HTTP_X_REAL_IP   $remote_addr;
# Forward the bearer token explicitly — JWT auth depends on it. nginx usually
# passes it automatically, but setting it removes any version/edge ambiguity
# (a missing token would lock out every logged-in user).
fastcgi_param  HTTP_AUTHORIZATION $http_authorization;
fastcgi_read_timeout 120s;
# Buffering left at nginx default (on); the /media/ streaming block overrides
# it to off. Don't set it here or per-location overrides become duplicates.
fastcgi_buffers 16 16k;
fastcgi_buffer_size 32k;
