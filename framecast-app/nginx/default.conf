# ── Marketing site: wyvstudio.com (root domain) ─────────────────────────────
server {
    listen 80;
    server_name wyvstudio.com www.wyvstudio.com;

    location / {
        proxy_pass http://marketing:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ── App: app.wyvstudio.com + catch-all ──────────────────────────────────────
server {
    listen 80 default_server;
    server_name app.wyvstudio.com _;

    # Vue SPA
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Cache hashed assets forever, everything else no-cache
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Media asset streaming (signed URLs, web route not under /api/).
    # FastCGI to php-fpm; buffering off so large media streams through
    # instead of being spooled to a temp file first.
    location /media/ {
        include /etc/nginx/fastcgi-api.conf;
        fastcgi_buffering off;
        client_max_body_size 100M;
    }

    # API — FastCGI to php-fpm (real concurrency; replaces single-threaded
    # `artisan serve`, which serialized every request).
    location /api/ {
        include /etc/nginx/fastcgi-api.conf;
        client_max_body_size 100M;
    }

    # Reverb WebSocket
    location /app/ {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Reverb broadcasting auth (also used by WebSocket client) — Laravel route.
    location /broadcasting/ {
        include /etc/nginx/fastcgi-api.conf;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
