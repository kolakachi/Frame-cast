<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WyvStudio</title>
    <!-- Paddle.js — loaded once globally, used in SettingsView billing section -->
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
    <!-- Cold-boot loader: shown before the JS bundle loads/executes so a slow
         network never flashes a blank white screen. Lives inside #app, so Vue
         replaces it automatically on mount — no removal code needed. -->
    <style>
      #app-boot { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; background: #0a0a0f; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      #app-boot .bm { position: relative; width: 58px; height: 58px; display: grid; place-items: center; }
      #app-boot .bm-mark { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(155deg, #ff8a4c, #ff6b35); display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 21px; box-shadow: 0 6px 20px rgba(255,107,53,.35); animation: bm-breathe 1.8s ease-in-out infinite; }
      #app-boot .bm-ring { position: absolute; inset: 0; border-radius: 50%; border: 2px solid rgba(255,107,53,.18); border-top-color: #ff6b35; animation: bm-spin .9s linear infinite; }
      #app-boot .bm-text { color: #8a8a94; font-size: 14px; letter-spacing: .01em; }
      @keyframes bm-spin { to { transform: rotate(360deg); } }
      @keyframes bm-breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(.92); opacity: .85; } }
      @media (prefers-reduced-motion: reduce) { #app-boot .bm-ring, #app-boot .bm-mark { animation: none; } }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="app-boot">
        <div class="bm"><div class="bm-ring"></div><div class="bm-mark">W</div></div>
        <div class="bm-text">Loading your studio…</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
